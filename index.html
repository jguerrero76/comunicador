<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comunicador</title>
  <style>
    :root {
      --primary: #6c63ff;
      --primary-light: #a29bfe;
      --success: #00b894;
      --warning: #fdcb6e;
      --bg: #f8f9ff;
      --card: #ffffff;
      --text: #2d3436;
      --muted: #636e72;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
    }

    header { text-align: center; padding: 20px 0 16px; }
    header h1 { font-size: 1.8rem; color: var(--primary); font-weight: 800; }
    header p { color: var(--muted); font-size: 0.95rem; margin-top: 4px; }

    .stars-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 1rem;
      color: var(--warning);
      font-weight: 700;
    }

    #topic-screen { max-width: 560px; margin: 0 auto; }
    #topic-screen h2 { text-align: center; margin-bottom: 20px; color: var(--primary); font-size: 1.3rem; }

    .topics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }

    .topic-btn {
      background: var(--card);
      border: 2px solid transparent;
      border-radius: var(--radius);
      padding: 20px 16px;
      cursor: pointer;
      text-align: center;
      transition: all 0.18s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .topic-btn:hover {
      border-color: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(108,99,255,0.15);
    }

    .topic-btn .emoji { font-size: 2.2rem; display: block; margin-bottom: 8px; }
    .topic-btn .label { font-size: 1rem; font-weight: 700; color: var(--text); }

    #chat-screen { max-width: 600px; margin: 0 auto; display: none; }

    .chat-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .chat-header .topic-icon { font-size: 2rem; }
    .chat-header h2 { font-size: 1.15rem; color: var(--primary); font-weight: 800; }

    .back-btn {
      margin-left: auto;
      background: none;
      border: 2px solid #dfe6e9;
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--muted);
      transition: all 0.18s;
    }
    .back-btn:hover { border-color: var(--primary); color: var(--primary); }

    .messages {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      min-height: 280px;
      max-height: 380px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .msg {
      max-width: 85%;
      padding: 10px 16px;
      border-radius: 18px;
      font-size: 0.97rem;
      line-height: 1.5;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .msg.ai { background: #f0eeff; color: var(--text); border-bottom-left-radius: 4px; align-self: flex-start; }
    .msg.user { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; align-self: flex-end; }
    .msg.system {
      background: linear-gradient(135deg, #fdcb6e22, #fd79a822);
      color: var(--text);
      border: 1px solid #fdcb6e55;
      align-self: center;
      text-align: center;
      font-weight: 700;
      font-size: 0.92rem;
      max-width: 100%;
    }

    .word-meter { background: var(--card); border-radius: 12px; padding: 12px 16px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .word-meter-label { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }
    .word-meter-label span:last-child { font-weight: 700; color: var(--primary); }
    .progress-track { background: #f0eeff; border-radius: 99px; height: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary-light), var(--primary)); border-radius: 99px; transition: width 0.3s ease; }
    .milestones { display: flex; justify-content: space-between; margin-top: 4px; }
    .milestone { font-size: 0.72rem; color: var(--muted); text-align: center; flex: 1; }
    .milestone.reached { color: var(--success); font-weight: 700; }

    .input-area { display: flex; gap: 8px; align-items: flex-end; }
    .input-wrap { flex: 1; }

    textarea {
      width: 100%;
      border: 2px solid #dfe6e9;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 1rem;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      min-height: 52px;
      max-height: 120px;
      line-height: 1.4;
    }
    textarea:focus { border-color: var(--primary); }

    .send-btn {
      background: var(--primary); color: #fff; border: none; border-radius: 14px;
      width: 52px; height: 52px; font-size: 1.4rem; cursor: pointer;
      transition: background 0.18s, transform 0.1s; flex-shrink: 0;
    }
    .send-btn:hover { background: #574fd6; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { background: #b2bec3; cursor: not-allowed; }

    .hint-btn {
      background: #fff; color: var(--primary); border: 2px solid var(--primary-light);
      border-radius: 14px; padding: 0 16px; height: 52px; font-size: 0.85rem;
      cursor: pointer; font-weight: 700; transition: all 0.18s; flex-shrink: 0;
    }
    .hint-btn:hover { background: #f0eeff; }

    .stats-bar {
      display: flex; justify-content: space-around; background: var(--card);
      border-radius: var(--radius); padding: 12px 8px; margin-top: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .stat { text-align: center; }
    .stat .val { font-size: 1.3rem; font-weight: 800; color: var(--primary); }
    .stat .lbl { font-size: 0.72rem; color: var(--muted); }

    #milestone-popup {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); z-index: 100;
      justify-content: center; align-items: center;
    }
    #milestone-popup.show { display: flex; }

    .popup-card {
      background: var(--card); border-radius: 24px; padding: 36px 32px;
      text-align: center; max-width: 320px; width: 90%;
      animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .popup-card .big-emoji { font-size: 4rem; display: block; margin-bottom: 8px; }
    .popup-card h3 { font-size: 1.4rem; color: var(--primary); margin-bottom: 6px; }
    .popup-card p { color: var(--muted); font-size: 0.95rem; margin-bottom: 20px; }

    .btn { display: inline-block; padding: 12px 28px; border-radius: 12px; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.18s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #574fd6; }

    @media (max-width: 420px) {
      .topics-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .topic-btn { padding: 16px 10px; }
      .hint-btn { padding: 0 10px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>💬 Comunicador</h1>
  <p>Hablemos juntos</p>
  <div class="stars-bar">⭐ <span id="total-stars">0</span> estrellas totales</div>
</header>

<div id="topic-screen">
  <h2>¿De qué quieres hablar hoy?</h2>
  <div class="topics-grid">
    <button class="topic-btn" onclick="selectTopic('dia')"><span class="emoji">🌞</span><span class="label">Mi día</span></button>
    <button class="topic-btn" onclick="selectTopic('juegos')"><span class="emoji">🎮</span><span class="label">Juegos</span></button>
    <button class="topic-btn" onclick="selectTopic('series')"><span class="emoji">🎬</span><span class="label">Series y Pelis</span></button>
    <button class="topic-btn" onclick="selectTopic('animales')"><span class="emoji">🐾</span><span class="label">Animales</span></button>
    <button class="topic-btn" onclick="selectTopic('comida')"><span class="emoji">🍕</span><span class="label">Comida</span></button>
    <button class="topic-btn" onclick="selectTopic('lugares')"><span class="emoji">🗺️</span><span class="label">Lugares</span></button>
  </div>
</div>

<div id="chat-screen">
  <div class="chat-header">
    <span class="topic-icon" id="chat-icon"></span>
    <h2 id="chat-topic-name"></h2>
    <button class="back-btn" onclick="goBack()">← Cambiar tema</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="word-meter">
    <div class="word-meter-label">
      <span>Palabras en tu frase</span>
      <span id="word-count">0</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="milestones">
      <div class="milestone" id="m3">⭐ 3</div>
      <div class="milestone" id="m5">⭐⭐ 5</div>
      <div class="milestone" id="m8">⭐⭐⭐ 8</div>
      <div class="milestone" id="m12">🏆 12</div>
      <div class="milestone" id="m18">🚀 18</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="user-input" placeholder="Escribe aquí..." rows="1"
        oninput="onInput()" onkeydown="onKey(event)"></textarea>
    </div>
    <button class="hint-btn" onclick="showHint()">💡 Pista</button>
    <button class="send-btn" onclick="sendMessage()" id="send-btn" disabled>➤</button>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="val" id="stat-responses">0</div><div class="lbl">Respuestas</div></div>
    <div class="stat"><div class="val" id="stat-best">0</div><div class="lbl">Mejor frase</div></div>
    <div class="stat"><div class="val" id="stat-stars">0</div><div class="lbl">⭐ Sesión</div></div>
  </div>
</div>

<div id="milestone-popup">
  <div class="popup-card">
    <span class="big-emoji" id="popup-emoji">🌟</span>
    <h3 id="popup-title">¡Increíble!</h3>
    <p id="popup-msg"></p>
    <button class="btn btn-primary" onclick="closePopup()">¡Genial! →</button>
  </div>
</div>

const MILESTONES = [
  { words: 3,  emoji: '⭐',  title: '¡Muy bien!',      msg: '¡3 palabras! Vas genial.',          stars: 1 },
  { words: 5,  emoji: '⭐⭐', title: '¡Estupendo!',     msg: '5 palabras. ¡Eso es hablar!',        stars: 2 },
  { words: 8,  emoji: '🌟',  title: '¡Fantástico!',    msg: '8 palabras. ¡Qué frase tan larga!',  stars: 3 },
  { words: 12, emoji: '🏆',  title: '¡Campeón!',       msg: '12 palabras. ¡Eres increíble!',      stars: 5 },
  { words: 18, emoji: '🚀',  title: '¡Superestrella!', msg: '18 palabras. ¡Récord histórico!',    stars: 8 },
];

let currentTopicKey = null;
let responseIndex = 0;
let hintIndex = 0;
let sessionResponses = 0;
let sessionBestWords = 0;
let sessionStars = 0;
let reachedMilestones = new Set();
let pendingPopups = [];
let totalStars = parseInt(localStorage.getItem('comunicador_stars') || '0');

document.getElementById('total-stars').textContent = totalStars;

function selectTopic(key) {
  currentTopicKey = key;
  responseIndex = 0;
  hintIndex = 0;
  sessionResponses = 0;
  sessionBestWords = 0;
  sessionStars = 0;
  reachedMilestones = new Set();
  pendingPopups = [];

  const topic = TOPICS[key];
  document.getElementById('chat-icon').textContent = topic.emoji;
  document.getElementById('chat-topic-name').textContent = topic.name;
  document.getElementById('messages').innerHTML = '';
  updateStats();
  resetMeter();

  document.getElementById('topic-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'block';

  addMessage(topic.starter, 'ai');
  document.getElementById('user-input').focus();
}

function goBack() {
  document.getElementById('chat-screen').style.display = 'none';
  document.getElementById('topic-screen').style.display = 'block';
}

function onInput() {
  const ta = document.getElementById('user-input');
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  updateMeter(countWords(ta.value));
  document.getElementById('send-btn').disabled = ta.value.trim().length === 0;
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function countWords(text) {
  return text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
}

function updateMeter(words) {
  document.getElementById('word-count').textContent = words;
  document.getElementById('progress-fill').style.width = Math.min(words / 20 * 100, 100) + '%';
  MILESTONES.forEach(m => {
    const el = document.getElementById('m' + m.words);
    if (el) el.classList.toggle('reached', words >= m.words);
  });
}

function resetMeter() {
  document.getElementById('user-input').value = '';
  document.getElementById('user-input').style.height = 'auto';
  updateMeter(0);
  document.getElementById('send-btn').disabled = true;
}

function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = text;
  const msgs = document.getElementById('messages');
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function sendMessage() {
  const ta = document.getElementById('user-input');
  const text = ta.value.trim();
  if (!text) return;

  const words = countWords(text);
  checkMilestones(words);

  addMessage(text, 'user');
  sessionResponses++;
  if (words > sessionBestWords) sessionBestWords = words;
  updateStats();
  resetMeter();

  const topic = TOPICS[currentTopicKey];
  const r = topic.responses[responseIndex % topic.responses.length];
  responseIndex++;

  setTimeout(() => {
    addMessage(r.praise + ' ' + r.q, 'ai');
    showNextPopup();
  }, 600);
}

function showHint() {
  const topic = TOPICS[currentTopicKey];
  const hint = topic.hints[hintIndex % topic.hints.length];
  hintIndex++;
  addMessage('💡 ' + hint, 'system');
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

function checkMilestones(words) {
  MILESTONES.forEach(m => {
    if (words >= m.words && !reachedMilestones.has(m.words)) {
      reachedMilestones.add(m.words);
      sessionStars += m.stars;
      totalStars += m.stars;
      localStorage.setItem('comunicador_stars', totalStars);
      document.getElementById('total-stars').textContent = totalStars;
      pendingPopups.push(m);
    }
  });
}

function showNextPopup() {
  if (pendingPopups.length === 0) return;
  const m = pendingPopups.shift();
  document.getElementById('popup-emoji').textContent = m.emoji;
  document.getElementById('popup-title').textContent = m.title;
  document.getElementById('popup-msg').textContent = m.msg;
  document.getElementById('milestone-popup').classList.add('show');
}

function closePopup() {
  document.getElementById('milestone-popup').classList.remove('show');
  showNextPopup();
}

function updateStats() {
  document.getElementById('stat-responses').textContent = sessionResponses;
  document.getElementById('stat-best').textContent = sessionBestWords;
  document.getElementById('stat-stars').textContent = sessionStars;
}
</script>
